name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'packages/electron/package.json', 'packages/backend/package.json', 'packages/frontend/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w packages/backend

      - name: Build frontend
        run: npm run build -w packages/frontend

      - name: Prepare backend for packaging (unix)
        if: runner.os != 'Windows'
        run: bash scripts/prepare-backend.sh

      - name: Prepare backend for packaging (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location packages/backend
          Remove-Item -Recurse -Force _pkg -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path _pkg
          Copy-Item package.json _pkg/
          Set-Location _pkg
          npm install --omit=dev

      - name: Build Electron
        run: npm run build -w packages/electron

      - name: Package Electron
        run: npm run package -w packages/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/electron/release/*.dmg
            packages/electron/release/*.exe
          if-no-files-found: warn

      - name: Find installers
        id: find
        shell: bash
        run: |
          DMG=$(ls packages/electron/release/*.dmg 2>/dev/null | head -1)
          EXE=$(ls packages/electron/release/*.exe 2>/dev/null | head -1)
          echo "dmg=$DMG" >> $GITHUB_OUTPUT
          echo "exe=$EXE" >> $GITHUB_OUTPUT

      - name: Upload to release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.dmg }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.exe }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
